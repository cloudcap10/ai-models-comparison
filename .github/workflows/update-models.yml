name: Autopilot — Update Model Data

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync pricing from OpenRouter (free, no API key needed)
        run: python scripts/update_models.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet models-data.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if data changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="autopilot/model-update-$(date +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add models-data.yml
          git commit -m "chore: autopilot pricing sync $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Autopilot: pricing sync $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
## Autopilot Pricing Sync

Automatically synced **inputPricePer1M**, **outputPricePer1M**, and **contextWindow**
from [OpenRouter's public API](https://openrouter.ai/api/v1/models).

No AI inference used — pure data from OpenRouter's catalogue.

### What changed
See the diff below. Only pricing and context window fields are touched;
descriptions, capabilities, and icons are never modified by this workflow.

### Checklist
- [ ] Pricing changes look correct
- [ ] Context window changes look correct
- [ ] No unexpected fields were modified
EOF
)" \
            --label "autopilot" || true

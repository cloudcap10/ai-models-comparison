name: Autopilot - Update Model Data

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync pricing from OpenRouter
        run: python scripts/update_models.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet models-data.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if data changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="autopilot/model-update-$(date +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add models-data.yml
          git commit -m "chore: autopilot pricing sync $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          printf 'Synced `inputPricePer1M`, `outputPricePer1M`, and `contextWindow` from OpenRouter API.\n\nSee the **Job Summary** tab for a full breakdown and any newly detected models from tracked providers that may need adding.\n\nPlease review the diff before merging.' > /tmp/pr-body.md
          gh pr create \
            --title "Autopilot: pricing sync $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.md \
            --label "autopilot" || true

      - name: Always report new model detections (even if no price changes)
        if: steps.diff.outputs.changed == 'false'
        run: echo "No data changes this week — check Job Summary for new model detections."
